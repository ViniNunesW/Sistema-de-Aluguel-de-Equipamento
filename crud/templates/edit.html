<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-3">✏️ Editar Cliente</h2>

<form method="POST" class="card p-4 shadow-sm">

<div class="row">

<div class="col-md-6 mb-2">
    <label>Nome</label>
    <input type="text" name="nome" value="{{ cliente.nome }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>CPF</label>
    <input type="text" name="cpf" value="{{ cliente.cpf }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Data Nascimento</label>
    <input type="date" name="data_nascimento" value="{{ cliente.data_nascimento }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Telefone</label>
    <input type="text" name="telefone" value="{{ cliente.telefone }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Email</label>
    <input type="email" name="email" value="{{ cliente.email }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Data Cadastro</label>
    <input type="date" name="data_cadastro" value="{{ cliente.data_cadastro }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Sexo</label>
    <input type="text" name="sexo" value="{{ cliente.sexo }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Estado Civil</label>
    <input type="text" name="estado_civil" value="{{ cliente.estado_civil }}" class="form-control">
</div>

<div class="col-md-6 mb-2">
    <label>Ativo</label>
    <select name="ativo" class="form-control">
        <option value="1" {% if cliente.ativo %}selected{% endif %}>Sim</option>
        <option value="0" {% if not cliente.ativo %}selected{% endif %}>Não</option>
    </select>
</div>

<div class="col-md-6 mb-2">
    <label>Endereço</label>
    <input type="text" name="endereco" value="{{ cliente.endereco }}" class="form-control">
</div>

</div>

<button type="submit" class="btn btn-primary mt-3">Atualizar</button>
<a href="/" class="btn btn-secondary mt-3">Voltar</a>

</form>

</div>

</body>
</html>
